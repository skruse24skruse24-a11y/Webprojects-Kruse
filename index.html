<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Web Projects</title>
    <style>
        :root {
            --bg: #f6f2eb;
            --panel: #fffaf2;
            --ink: #2f1e1e;
            --line: #dfd0b6;
            --accent: #9c3f3f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at top, #fff8ec 0%, var(--bg) 100%);
        }

        main {
            width: min(720px, 100%);
            background: var(--panel);
            border: 2px solid var(--line);
            border-radius: 16px;
            padding: 28px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.5rem, 2.6vw, 2rem);
        }

        p {
            margin: 0 0 18px;
            line-height: 1.5;
        }

        ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 12px;
        }

        a {
            display: block;
            text-decoration: none;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--ink);
            font-weight: 600;
            background: #fff;
        }

        a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>

<body>
    <main>
        <h1>Project Home</h1>
        <p>Select a web project:</p>
        <ul>
            <li><a href="Assassination%20Timeline/assassination-timeline.html">Assassination Timeline</a></li>
            <li><a href="Character%20Creator/character-creator.html">Character Creator</a></li>
        </ul>
    </main>
</body>

</html>
